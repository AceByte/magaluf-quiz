<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kompendium Sektion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="sub-hero" id="top">
    <div class="sub-hero-inner">
      <a class="back-link" href="index.html">Tilbage til oversigt</a>
      <h1 id="sectionTitle">Indlæser...</h1>
      <div id="sectionIntro" class="section-intro"></div>
    </div>
  </header>

  <main class="section-page">
    <aside class="toc">
      <h2>Indhold</h2>
      <ul id="tocList"></ul>
    </aside>
    <article class="content" id="sectionContent"></article>
  </main>

  <script src="app.js"></script>
  <script>
    (async function () {
      const titleEl = document.getElementById("sectionTitle");
      const introEl = document.getElementById("sectionIntro");
      const tocEl = document.getElementById("tocList");
      const contentEl = document.getElementById("sectionContent");
      const tocState = { links: [] };

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatParagraphs(text) {
        return String(text || "")
          .split(/\n\s*\n/)
          .map(function (p) { return p.trim(); })
          .filter(Boolean)
          .map(function (p) { return "<p>" + escapeHtml(p).replace(/\n/g, "<br>") + "</p>"; })
          .join("");
      }

      function formatRecipeBlock(text) {
        const normalized = String(text || "")
          .replace(/\n+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/([A-Z][A-Za-z0-9 '\/&-]{2,})\s+Glas:/g, "\n##$1\nGlas:");

        const chunks = normalized
          .split("\n##")
          .map(function (c) { return c.trim(); })
          .filter(Boolean);

        function parseRecipeFields(body) {
          const labels = ["Glas", "Is", "Metode", "Garnish", "Ingredienser"];
          const re = /(Glas|Is|Metode|Garnish|Ingredienser):/g;
          const matches = [];
          let match;
          while ((match = re.exec(body)) !== null) {
            matches.push({ label: match[1], start: match.index, marker: match[0] });
          }

          if (!matches.length) {
            return null;
          }

          const fields = {};
          for (let i = 0; i < matches.length; i += 1) {
            const current = matches[i];
            const end = i < matches.length - 1 ? matches[i + 1].start : body.length;
            const value = body
              .slice(current.start + current.marker.length, end)
              .trim()
              .replace(/\s+/g, " ");
            fields[current.label] = value;
          }

          const meta = labels
            .filter(function (label) { return label !== "Ingredienser" && fields[label]; })
            .map(function (label) {
              return '<div class="meta-item"><span class="meta-label">' + label + '</span><span class="meta-value">' + escapeHtml(fields[label]) + '</span></div>';
            })
            .join("");

          const ingredientValue = fields.Ingredienser || "";
          const ingredients = ingredientValue
            ? ingredientValue.split(/,\s*/).map(function (i) { return i.trim(); }).filter(Boolean)
            : [];

          return {
            metaHtml: meta,
            ingredientItems: ingredients
          };
        }

        return '<div class="recipe-grid">' + chunks.map(function (chunk) {
          const firstLineBreak = chunk.indexOf("\n");
          const name = firstLineBreak >= 0 ? chunk.slice(0, firstLineBreak).trim() : chunk;
          const body = firstLineBreak >= 0 ? chunk.slice(firstLineBreak + 1).trim() : "";
          const parsed = parseRecipeFields(body);

          if (!parsed) {
            return '<article class="recipe-card"><h3>' + escapeHtml(name) + '</h3><p class="recipe-line">' + escapeHtml(body) + '</p></article>';
          }

          const ingredientsHtml = parsed.ingredientItems.length
            ? '<div class="ingredients-wrap"><h4>Ingredienser</h4><ul class="ingredients-list">' + parsed.ingredientItems.map(function (item) {
              return '<li>' + escapeHtml(item) + '</li>';
            }).join("") + '</ul></div>'
            : "";

          return '<article class="recipe-card"><h3>' + escapeHtml(name) + '</h3><div class="recipe-meta-grid">' + parsed.metaHtml + '</div>' + ingredientsHtml + '</article>';
        }).join("") + "</div>";
      }

      function setActiveToc(id) {
        tocState.links.forEach(function (a) {
          if (a.getAttribute("href") === "#" + id) a.classList.add("is-active");
          else a.classList.remove("is-active");
        });
      }

      function setupTocObserver() {
        const blocks = Array.from(document.querySelectorAll(".section-block"));
        if (!blocks.length) return;

        const observer = new IntersectionObserver(function (entries) {
          const visible = entries
            .filter(function (e) { return e.isIntersecting; })
            .sort(function (a, b) { return a.boundingClientRect.top - b.boundingClientRect.top; });

          if (visible.length) {
            setActiveToc(visible[0].target.id);
          }
        }, {
          root: null,
          rootMargin: "-22% 0px -65% 0px",
          threshold: [0.01, 0.2, 0.5]
        });

        blocks.forEach(function (b) { observer.observe(b); });
        setActiveToc(blocks[0].id);
      }

      function formatBlockHtml(block) {
        const txt = block && block.text ? block.text : "";
        if (/Glas:/i.test(txt) && /Ingredienser:/i.test(txt)) {
          return formatRecipeBlock(txt);
        }
        return formatParagraphs(txt);
      }

      function queryParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      try {
        const text = await window.KompendiumApp.fetchKompendium("./kompendium.txt");
        const parsed = window.KompendiumApp.parseKompendium(text);
        const slug = queryParam("slug") || "";
        const section = parsed.sections.find(function (s) { return s.slug === slug; }) || parsed.sections[0];

        document.title = section.title + " | Kompendium";
        titleEl.textContent = section.title;
        introEl.innerHTML = formatParagraphs(section.introText || "Ingen intro tilgængelig.");

        tocEl.innerHTML = "";
        section.blocks.forEach(function (block) {
          const li = document.createElement("li");
          li.innerHTML = '<a class="toc-link" href="#' + block.slug + '">' + block.title + '</a>';
          tocEl.appendChild(li);
        });
        tocState.links = Array.from(tocEl.querySelectorAll("a"));

        if (!section.blocks.length) {
          contentEl.innerHTML = "<p>Denne sektion har ingen undersektioner.</p>";
          return;
        }

        contentEl.innerHTML = section.blocks.map(function (block) {
          return '<section class="section-block" id="' + block.slug + '"><h2>' + escapeHtml(block.title) + '</h2>' + formatBlockHtml(block) + '</section>';
        }).join("\n");

        setupTocObserver();
      } catch (err) {
        titleEl.textContent = "Fejl";
        introEl.textContent = err.message;
      }
    })();
  </script>
</body>
</html>
