<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alt om søgning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="sub-hero" id="top">
    <div class="sub-hero-inner">
      <a class="back-link" href="index.html">Tilbage til oversigt</a>
      <h1 id="pageTitle">Alt om søgning</h1>
      <div id="pageIntro" class="section-intro"></div>
    </div>
  </header>

  <main class="section-page">
    <aside class="toc">
      <h2>Sektioner</h2>
      <ul id="tocList"></ul>
    </aside>
    <article class="content" id="searchContent"></article>
  </main>

  <script src="app.js"></script>
  <script>
    (async function () {
      const titleEl = document.getElementById("pageTitle");
      const introEl = document.getElementById("pageIntro");
      const tocEl = document.getElementById("tocList");
      const contentEl = document.getElementById("searchContent");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function qp(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function formatParagraphs(text) {
        return String(text || "")
          .split(/\n\s*\n/)
          .map(function (p) { return p.trim(); })
          .filter(Boolean)
          .map(function (p) { return "<p>" + escapeHtml(p).replace(/\n/g, "<br>") + "</p>"; })
          .join("");
      }

      function formatRecipeBlock(text) {
        const normalized = String(text || "")
          .replace(/\n+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/([A-Z][A-Za-z0-9 '\/&-]{2,})\s+Glas:/g, "\n##$1\nGlas:");

        const chunks = normalized
          .split("\n##")
          .map(function (c) { return c.trim(); })
          .filter(Boolean);

        if (chunks.length <= 1) {
          return formatParagraphs(text);
        }

        function parseRecipeFields(body) {
          const labels = ["Glas", "Is", "Metode", "Garnish", "Ingredienser"];
          const re = /(Glas|Is|Metode|Garnish|Ingredienser):/g;
          const matches = [];
          let match;
          while ((match = re.exec(body)) !== null) {
            matches.push({ label: match[1], start: match.index, marker: match[0] });
          }

          if (!matches.length) return null;

          const fields = {};
          for (let i = 0; i < matches.length; i += 1) {
            const current = matches[i];
            const end = i < matches.length - 1 ? matches[i + 1].start : body.length;
            fields[current.label] = body
              .slice(current.start + current.marker.length, end)
              .trim()
              .replace(/\s+/g, " ");
          }

          const metaHtml = labels
            .filter(function (label) { return label !== "Ingredienser" && fields[label]; })
            .map(function (label) {
              return '<div class="meta-item"><span class="meta-label">' + label + '</span><span class="meta-value">' + escapeHtml(fields[label]) + '</span></div>';
            })
            .join("");

          const ingredientItems = (fields.Ingredienser || "")
            .split(/,\s*/)
            .map(function (i) { return i.trim(); })
            .filter(Boolean);

          return { metaHtml: metaHtml, ingredientItems: ingredientItems };
        }

        return '<div class="recipe-grid">' + chunks.map(function (chunk) {
          const firstLineBreak = chunk.indexOf("\n");
          const name = firstLineBreak >= 0 ? chunk.slice(0, firstLineBreak).trim() : chunk;
          const body = firstLineBreak >= 0 ? chunk.slice(firstLineBreak + 1).trim() : "";
          const parsed = parseRecipeFields(body);

          if (!parsed) {
            return '<article class="recipe-card"><h3>' + escapeHtml(name) + '</h3><p class="recipe-line">' + escapeHtml(body) + '</p></article>';
          }

          const ingredientsHtml = parsed.ingredientItems.length
            ? '<div class="ingredients-wrap"><h4>Ingredienser</h4><ul class="ingredients-list">' + parsed.ingredientItems.map(function (item) {
              return '<li>' + escapeHtml(item) + '</li>';
            }).join("") + '</ul></div>'
            : "";

          return '<article class="recipe-card"><h3>' + escapeHtml(name) + '</h3><div class="recipe-meta-grid">' + parsed.metaHtml + '</div>' + ingredientsHtml + '</article>';
        }).join("") + "</div>";
      }

      function formatBlockHtml(block) {
        const txt = block && block.text ? block.text : "";
        if (/Glas:/i.test(txt) && /Ingredienser:/i.test(txt)) {
          return formatRecipeBlock(txt);
        }
        return formatParagraphs(txt);
      }

      const query = qp("q").trim();
      if (!query) {
        titleEl.textContent = "Alt om søgning";
        introEl.innerHTML = "<p>Ingen søgning valgt.</p>";
        contentEl.innerHTML = "<p>Gå tilbage og søg efter fx vodka eller gin.</p>";
        return;
      }

      try {
        const text = await window.KompendiumApp.fetchKompendium("./kompendium.txt");
        const parsed = window.KompendiumApp.parseKompendium(text);
        const result = window.KompendiumApp.searchParsedContent(parsed, query);
        const suggestions = window.KompendiumApp.buildSearchSuggestions(parsed, query, 14);

        titleEl.textContent = `Alt om: ${query}`;
        introEl.innerHTML = `<p>Samlet visning af alt relateret indhold for søgningen "${escapeHtml(query)}".</p><p class="mini">Standard søgeforslag: ${suggestions.length} match.</p>`;

        if (!result.length) {
          contentEl.innerHTML = "<p>Ingen direkte resultater fundet.</p>";
          return;
        }

        tocEl.innerHTML = result
          .map(function (section) {
            return `<li><a class=\"toc-link\" href=\"#${section.slug}\">${escapeHtml(section.title)}</a></li>`;
          })
          .join("");

        contentEl.innerHTML = result
          .map(function (section) {
            const blockHtml = section.blocks
              .map(function (b) {
                return `<section class=\"section-block\" id=\"${escapeHtml(b.slug)}\"><h3>${escapeHtml(b.title)}</h3>${formatBlockHtml(b)}</section>`;
              })
              .join("");

            const introHtml = section.introText ? formatParagraphs(section.introText) : "";
            return `<section class=\"section-block\" id=\"${escapeHtml(section.slug)}\"><h2>${escapeHtml(section.title)}</h2>${introHtml}${blockHtml || "<p class=\"mini\">Ingen undersektioner i dette match.</p>"}</section>`;
          })
          .join("");
      } catch (err) {
        titleEl.textContent = "Fejl";
        introEl.innerHTML = `<p>${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
